services:
  app:
    build:
      context: .
      target: dev
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: file:./dev.db
    command: sh -c "npm run prisma:push && npm run db:seed && npm run dev -- --hostname 0.0.0.0"

volumes:
  node_modules:
